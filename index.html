<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kedai Pancing Anda</title>
<style>
:root{--bg:#f5f6f7;--card:#ffffff;--card2:#fbfbfc;--text:#1f2328;--muted:#6b7280;--line:#e5e7eb;--accent:#4b5563;--accent-dark:#374151;--accent-soft:#f3f4f6;--shadow:0 10px 24px rgba(0,0,0,.06)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f5f6f7 0%,#eef0f2 100%);color:var(--text)}a{text-decoration:none;color:inherit}input,textarea,select,button{font:inherit}
.topbar{background:#2f343a;color:#fff;text-align:center;padding:10px 16px;font-size:14px;font-weight:700}.container{max-width:1500px;margin:0 auto;padding:0 16px}.header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid rgba(75,85,99,.12)}.header-inner{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 0}.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(180deg,var(--accent),var(--accent-dark));color:#fff;display:grid;place-items:center;font-weight:900;box-shadow:var(--shadow)}.brand h1{font-size:20px;line-height:1.1;margin:0}.brand p{margin:2px 0 0;font-size:12px;color:var(--muted)}
.header-btn,.add-btn,.details-btn,.floating-btn,.checkout-btn,.qty-btn,.popup-btn,.popup-btn-secondary,.mobile-cart-btn,.cart-close-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;padding:11px 14px;font-weight:800;cursor:pointer;transition:.18s ease}.header-btn:hover,.add-btn:hover,.details-btn:hover,.floating-btn:hover,.checkout-btn:hover,.qty-btn:hover,.popup-btn:hover,.popup-btn-secondary:hover,.mobile-cart-btn:hover,.cart-close-btn:hover{transform:translateY(-1px)}
.header-btn,.qty-btn,.checkout-btn,.popup-btn-secondary,.mobile-cart-btn,.cart-close-btn{background:var(--accent-dark);color:#fff;border:1px solid rgba(55,65,81,.20)}.add-btn,.details-btn,.floating-btn,.popup-btn{background:#fff;color:var(--accent-dark);border:1px solid var(--accent-dark)}.details-btn,.popup-btn{background:var(--accent-soft)}.checkout-btn{width:100%}
.catalog-wrap{padding:22px 0 90px}.catalog-top{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:16px}.catalog-top small{display:block;color:var(--accent-dark);font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}.catalog-top h2{margin:0;font-size:30px;line-height:1.1}.search{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px 13px;min-width:320px;box-shadow:var(--shadow)}.search input{border:0;outline:none;background:transparent;width:100%;font-size:14px;color:var(--text)}.search input::placeholder{color:#9CA3AF}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}.filter-btn{background:#fff;border:1px solid var(--line);color:var(--accent-dark);border-radius:999px;padding:9px 14px;font-weight:800;cursor:pointer;font-size:14px}.filter-btn.active{background:var(--accent-dark);border-color:var(--accent-dark);color:#fff}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:18px;align-items:start}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.product{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease}.product:hover{transform:translateY(-3px);border-color:#c7ccd3;box-shadow:0 18px 38px rgba(75,85,99,.08)}
.product-img-wrap{background:#fff;border-bottom:1px solid var(--line)}.product-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}.product-body{padding:14px}.meta{color:var(--muted);font-size:12px;font-weight:700}.product h3{font-size:16px;line-height:1.25;margin:8px 0 0;min-height:40px}.price-row{display:flex;align-items:end;gap:7px;margin-top:10px}.price{font-size:24px;font-weight:900;line-height:1;color:var(--accent-dark)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.add-btn,.details-btn{font-size:13px;padding:10px 12px}
.cart-panel{position:sticky;top:92px;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}.cart-head{padding:16px 16px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}.cart-head h3{margin:0;font-size:22px;color:var(--accent-dark)}.cart-body{padding:16px;display:grid;gap:14px}.cart-items{display:grid;gap:10px}.cart-empty{padding:14px;border:1px dashed #d1d5db;border-radius:16px;color:var(--muted);font-size:14px;background:#fafafa}.cart-item{border:1px solid var(--line);border-radius:16px;padding:10px;background:#fafafa}.cart-item-top{display:flex;justify-content:space-between;gap:10px}.cart-item h4{margin:0;font-size:14px;line-height:1.3}.cart-item small{color:var(--muted)}
.qty-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}.qty-controls{display:flex;align-items:center;gap:8px}.qty-btn{width:32px;height:32px;padding:0;border-radius:10px}.qty-num{min-width:20px;text-align:center;font-weight:800}
.field-grid{display:grid;gap:10px}.field{display:grid;gap:6px}.field label{font-size:13px;font-weight:700;color:var(--accent-dark)}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:#fff;color:var(--text)}.field textarea{min-height:88px;resize:vertical}.summary{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fafafa;display:grid;gap:8px}.summary-row{display:flex;justify-content:space-between;gap:10px;font-size:14px}.summary-total{padding-top:8px;border-top:1px solid var(--line);font-size:18px;font-weight:900;color:var(--accent-dark)}
.faq{padding:16px 0 8px}.faq-head h3{font-size:28px;margin:0;color:var(--accent-dark)}.faq-list{display:grid;gap:12px}.faq-item{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow)}.faq-btn-acc{width:100%;background:transparent;border:0;padding:16px 18px;text-align:left;display:flex;justify-content:space-between;gap:12px;cursor:pointer;font-weight:800;font-size:17px;color:var(--text)}.faq-a{max-height:0;overflow:hidden;padding:0 18px;color:var(--muted);transition:max-height .25s ease,padding .25s ease}.faq-item.open .faq-a{max-height:160px;padding:0 18px 16px}
.overlay{position:fixed;inset:0;background:rgba(31,35,40,.28);backdrop-filter:blur(6px);z-index:120;display:flex;align-items:center;justify-content:center;padding:18px}.modal{width:min(760px,100%);background:#fff;border:1px solid #e5e7eb;border-radius:26px;box-shadow:0 28px 60px rgba(55,65,81,.12);overflow:hidden}.modal-head{padding:18px 20px;border-bottom:1px solid #eef0f2;display:flex;justify-content:space-between;gap:12px;align-items:center}.modal-head h3{margin:0;font-size:26px;color:var(--accent-dark)}.modal-body{padding:18px 20px;max-height:70vh;overflow:auto}.modal-body p{margin:0;color:#4b5563;line-height:1.6}.modal-actions{padding:18px 20px;border-top:1px solid #eef0f2;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}.hidden{display:none !important}
.faq-popup-list{display:grid;gap:12px}.faq-popup-item{background:#fafafa;border:1px solid #eef0f2;border-radius:18px;padding:14px}.faq-popup-item h4{margin:0 0 6px;font-size:16px;color:var(--accent-dark)}.faq-popup-item p{margin:0;color:#4b5563;line-height:1.6}
.mobile-cart-bar,.cart-drawer-backdrop{display:none} .cart-close-btn{display:none}
footer{margin-top:24px;border-top:1px solid #eef0f2;background:#fff}.footer-inner{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;padding:24px 0}.footer-inner p{margin:6px 0 0;color:var(--muted)}.floating{position:fixed;right:18px;bottom:18px;z-index:60;box-shadow:0 16px 28px rgba(55,65,81,.12)}
@media (max-width:1360px){.grid{grid-template-columns:repeat(3,1fr)}.layout{grid-template-columns:minmax(0,1fr) 360px}}@media (max-width:1100px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:repeat(3,1fr)}.cart-drawer-backdrop{display:block;position:fixed;inset:0;background:rgba(31,35,40,.28);backdrop-filter:blur(4px);z-index:109;opacity:0;pointer-events:none;transition:.2s ease}.cart-drawer-backdrop.open{opacity:1;pointer-events:auto}.cart-panel{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:110;width:100%;max-height:88vh;border-radius:22px 22px 0 0;transform:translateY(104%);transition:transform .22s ease;overflow:auto}.cart-panel.open{transform:translateY(0)}.cart-close-btn{display:inline-flex}.mobile-cart-bar{display:flex;position:fixed;left:12px;right:12px;bottom:12px;z-index:108;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 28px rgba(55,65,81,.12);padding:10px 12px}.mobile-cart-meta{display:grid;gap:2px}.mobile-cart-meta strong{font-size:14px;color:var(--accent-dark)}.mobile-cart-meta span{font-size:12px;color:var(--muted)}.catalog-wrap{padding-bottom:96px}.floating{bottom:86px}}@media (max-width:980px){.catalog-top,.footer-inner{flex-direction:column;align-items:stretch}.search{min-width:unset;width:100%}.grid{grid-template-columns:repeat(2,1fr)}}@media (max-width:720px){.header-inner{flex-wrap:wrap}.grid{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.catalog-top h2,.faq-head h3,.modal-head h3{font-size:24px}.floating{left:14px;right:14px}.floating .floating-btn{width:100%}.modal-actions{justify-content:stretch}.popup-btn,.popup-btn-secondary{width:100%}}
</style>
</head>
<body>
<div class="topbar">Kedai Pancing Anda</div>
<header class="header"><div class="container header-inner"><div class="brand"><div class="logo">KPA</div><div><h1>Kedai Pancing Anda</h1><p>Katalog & Checkout</p></div></div><a id="headerWhatsapp" class="header-btn" target="_blank" rel="noreferrer">WhatsApp</a></div></header>
<div id="cartDrawerBackdrop" class="cart-drawer-backdrop"></div>
<div id="detailsOverlay" class="overlay hidden" aria-hidden="true"><div class="modal"><div class="modal-head"><h3 id="detailsTitle">Details Produk</h3><button id="detailsCloseX" class="header-btn" type="button">✕ Close</button></div><div class="modal-body"><p id="detailsText"></p></div><div class="modal-actions"><button id="detailsClose" class="details-btn" type="button">Tutup</button></div></div></div>
<div id="faqOverlay" class="overlay hidden" aria-hidden="true"><div class="modal"><div class="modal-head"><h3>FAQ</h3><button id="faqCloseX" class="popup-btn-secondary" type="button">✕ Close</button></div><div class="modal-body"><div id="faqPopupList" class="faq-popup-list"></div></div><div class="modal-actions"><button id="faqClose" class="popup-btn-secondary" type="button">Tutup FAQ</button><button id="faqProceed" class="popup-btn" type="button">Teruskan</button></div></div></div>
<main><section id="products" class="container catalog-wrap"><div class="catalog-top"><div><small>Katalog Produk</small><h2>30 Produk</h2></div><label class="search"><span>🔍</span><input id="searchInput" type="text" placeholder="Cari produk..." /></label></div><div id="filters" class="filters"></div><div class="layout"><div><div id="productGrid" class="grid"></div></div><aside id="cartPanel" class="cart-panel"><div class="cart-head"><h3>Cart & Checkout</h3><div style="display:flex;gap:8px;align-items:center"><button id="faqOpenBtn" class="popup-btn" type="button">FAQ</button><button id="cartCloseBtn" class="cart-close-btn" type="button">Tutup</button></div></div><div class="cart-body"><div id="cartItems" class="cart-items"></div><div class="field-grid"><div class="field"><label for="custName">Nama</label><input id="custName" type="text" placeholder="Nama" /></div><div class="field"><label for="custPhone">No. Telefon</label><input id="custPhone" type="text" placeholder="0123456789" /></div><div class="field"><label for="custArea">Kawasan Postage</label><select id="custArea"><option value="Semenanjung">Semenanjung (RM10)</option><option value="Sabah / Sarawak">Sabah / Sarawak (RM15)</option></select></div><div class="field"><label for="custState">Negeri / Bandar</label><input id="custState" type="text" placeholder="Negeri / Bandar" /></div><div class="field"><label for="custAddress">Alamat</label><textarea id="custAddress" placeholder="Alamat penghantaran"></textarea></div><div class="field"><label for="custNote">Nota</label><textarea id="custNote" placeholder="Nota tambahan"></textarea></div></div><div class="summary"><div class="summary-row"><span>Subtotal</span><strong id="subtotalText">RM0.00</strong></div><div class="summary-row"><span>Postage</span><strong id="postageText">RM10.00</strong></div><div class="summary-row summary-total"><span>Jumlah</span><strong id="totalText">RM10.00</strong></div></div><button id="checkoutBtn" class="checkout-btn" type="button">Checkout WhatsApp</button></div></aside></div></section><section id="faq" class="container faq"><div class="faq-head"><h3>FAQ</h3></div><div id="faqList" class="faq-list"></div></section></main>
<div id="mobileCartBar" class="mobile-cart-bar"><div class="mobile-cart-meta"><strong id="mobileCartCount">0 item</strong><span id="mobileCartTotal">Jumlah RM10.00</span></div><button id="mobileCartBtn" class="mobile-cart-btn" type="button">Buka Cart</button></div>
<footer id="contact"><div class="container footer-inner"><div><strong>Kedai Pancing Anda</strong></div><div><strong>Contact</strong><p><span id="footerWhatsapp">+60 12-747 3680</span></p></div></div></footer><div class="floating"><a id="floatingWhatsapp" class="floating-btn" target="_blank" rel="noreferrer">💬 WhatsApp</a></div>
<script src="products.js"></script>
<script>
const config = window.SHOP_CONFIG || {};
const categories = ['All', ...(window.CATEGORIES || [])];
const products = window.PRODUCTS || [];
const faqs = window.FAQS || [];
const productGrid = document.getElementById('productGrid'); const filters = document.getElementById('filters'); const searchInput = document.getElementById('searchInput'); const faqList = document.getElementById('faqList'); const detailsOverlay = document.getElementById('detailsOverlay'); const detailsText = document.getElementById('detailsText'); const detailsTitle = document.getElementById('detailsTitle'); const detailsClose = document.getElementById('detailsClose'); const detailsCloseX = document.getElementById('detailsCloseX'); const faqOverlay = document.getElementById('faqOverlay'); const faqPopupList = document.getElementById('faqPopupList'); const faqOpenBtn = document.getElementById('faqOpenBtn'); const faqClose = document.getElementById('faqClose'); const faqCloseX = document.getElementById('faqCloseX'); const faqProceed = document.getElementById('faqProceed'); const cartItems = document.getElementById('cartItems'); const custName = document.getElementById('custName'); const custPhone = document.getElementById('custPhone'); const custArea = document.getElementById('custArea'); const custState = document.getElementById('custState'); const custAddress = document.getElementById('custAddress'); const custNote = document.getElementById('custNote'); const subtotalText = document.getElementById('subtotalText'); const postageText = document.getElementById('postageText'); const totalText = document.getElementById('totalText'); const checkoutBtn = document.getElementById('checkoutBtn'); const cartPanel = document.getElementById('cartPanel'); const cartDrawerBackdrop = document.getElementById('cartDrawerBackdrop'); const mobileCartBar = document.getElementById('mobileCartBar'); const mobileCartBtn = document.getElementById('mobileCartBtn'); const mobileCartCount = document.getElementById('mobileCartCount'); const mobileCartTotal = document.getElementById('mobileCartTotal'); const cartCloseBtn = document.getElementById('cartCloseBtn'); let activeCategory = 'All'; let searchValue = ''; const cart = new Map();
function waUrl(text){ const number=(config.whatsappNumber||'').replace(/[^\d]/g,''); return `https://wa.me/${number}?text=${encodeURIComponent(text)}`; }
function parseRm(value){ return Number(String(value).replace(/[^0-9.]/g,'')) || 0; } function formatRm(value){ return `RM${value.toFixed(2)}`; } function getPostage(){ return custArea.value === 'Sabah / Sarawak' ? 15 : 10; }
function isMobile(){ return window.innerWidth <= 1100; }
function openCartDrawer(){ if(!isMobile()) return; cartPanel.classList.add('open'); cartDrawerBackdrop.classList.add('open'); document.body.style.overflow='hidden'; }
function closeCartDrawer(){ cartPanel.classList.remove('open'); cartDrawerBackdrop.classList.remove('open'); document.body.style.overflow=''; }
function setupBrand(){ document.title=config.storeName||'Kedai Pancing Anda'; document.querySelector('.brand h1').textContent=config.storeName||'Kedai Pancing Anda'; document.querySelector('footer strong').textContent=config.storeName||'Kedai Pancing Anda'; document.getElementById('headerWhatsapp').href=waUrl('Saya nak tanya stok barang pancing'); document.getElementById('floatingWhatsapp').href=waUrl('Saya nak tanya pasal barang pancing'); document.getElementById('footerWhatsapp').textContent=config.whatsappDisplay||config.whatsappNumber||'-'; }
function renderFilters(){ filters.innerHTML = categories.map(cat => `<button class="filter-btn ${cat===activeCategory?'active':''}" data-category="${cat}">${cat}</button>`).join(''); filters.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { activeCategory = btn.dataset.category; renderFilters(); renderProducts(); })); }
function getFilteredProducts(){ return products.filter(item => (activeCategory === 'All' || item.category === activeCategory) && item.name.toLowerCase().includes(searchValue.toLowerCase())); }
function getProductById(id){ return products.find(p => p.id === id); }
function openDetails(product){ detailsTitle.textContent = product.name; detailsText.textContent = product.description || '-'; detailsOverlay.classList.remove('hidden'); }
function closeDetails(){ detailsOverlay.classList.add('hidden'); }
function openFaq(){ faqOverlay.classList.remove('hidden'); }
function closeFaq(){ faqOverlay.classList.add('hidden'); }
function renderFaqPopup(){ faqPopupList.innerHTML = faqs.map(item => `<div class="faq-popup-item"><h4>${item.q}</h4><p>${item.a}</p></div>`).join(''); }
function addToCart(productId){ cart.set(productId, (cart.get(productId) || 0) + 1); renderCart(); if(isMobile()) openCartDrawer(); }
function updateQty(productId, delta){ const next = (cart.get(productId) || 0) + delta; if (next <= 0) cart.delete(productId); else cart.set(productId, next); renderCart(); }
function productCard(product){ return `<article class="product"><div class="product-img-wrap"><img class="product-img" src="${product.image}" alt="${product.name}" /></div><div class="product-body"><div class="meta"><span>${product.category}</span></div><h3>${product.name}</h3><div class="price-row"><div class="price">${product.price}</div></div><div class="actions"><button class="add-btn" type="button" data-add-id="${product.id}">+ Tambah ke Cart</button><button class="details-btn" type="button" data-details-id="${product.id}">Details</button></div></div></article>`; }
function bindProductButtons(){ document.querySelectorAll('[data-add-id]').forEach(btn => btn.addEventListener('click', () => addToCart(Number(btn.dataset.addId)))); document.querySelectorAll('[data-details-id]').forEach(btn => btn.addEventListener('click', () => openDetails(getProductById(Number(btn.dataset.detailsId))))); }
function renderProducts(){ const filtered = getFilteredProducts(); if (!filtered.length){ productGrid.innerHTML = '<div class="faq-item" style="grid-column:1/-1;padding:18px">Tiada produk dijumpai.</div>'; return; } productGrid.innerHTML = filtered.map(productCard).join(''); bindProductButtons(); }
function renderCart(){ const entries = Array.from(cart.entries()); let itemCount = 0; if (!entries.length){ cartItems.innerHTML = '<div class="cart-empty">Cart masih kosong.</div>'; subtotalText.textContent='RM0.00'; postageText.textContent=formatRm(getPostage()); totalText.textContent=formatRm(getPostage()); mobileCartCount.textContent='0 item'; mobileCartTotal.textContent='Jumlah ' + formatRm(getPostage()); return; } let subtotal = 0; cartItems.innerHTML = entries.map(([id, qty]) => { itemCount += qty; const p = getProductById(id); const lineTotal = parseRm(p.price) * qty; subtotal += lineTotal; return `<div class="cart-item"><div class="cart-item-top"><div><h4>${p.name}</h4><small>${p.category} • ${p.price}</small></div><strong>${formatRm(lineTotal)}</strong></div><div class="qty-row"><div class="qty-controls"><button class="qty-btn" type="button" data-qty-id="${id}" data-delta="-1">−</button><div class="qty-num">${qty}</div><button class="qty-btn" type="button" data-qty-id="${id}" data-delta="1">+</button></div><button class="qty-btn" type="button" data-qty-id="${id}" data-delta="-${qty}">✕</button></div></div>`; }).join(''); const postage = getPostage(); const total = subtotal + postage; subtotalText.textContent = formatRm(subtotal); postageText.textContent = formatRm(postage); totalText.textContent = formatRm(total); mobileCartCount.textContent = `${itemCount} item`; mobileCartTotal.textContent = 'Jumlah ' + formatRm(total); document.querySelectorAll('[data-qty-id]').forEach(btn => btn.addEventListener('click', () => updateQty(Number(btn.dataset.qtyId), Number(btn.dataset.delta)))); }
function buildWhatsappMessage(){ const entries = Array.from(cart.entries()); if (!entries.length){ alert('Cart masih kosong.'); return null; } if (!custName.value.trim() || !custPhone.value.trim() || !custState.value.trim() || !custAddress.value.trim()){ alert('Sila lengkapkan Nama, No. Telefon, Negeri/Bandar dan Alamat.'); return null; } let subtotal = 0; const lines = entries.map(([id, qty], idx) => { const p = getProductById(id); const lineTotal = parseRm(p.price) * qty; subtotal += lineTotal; return `${idx+1}. ${p.name} x${qty} = ${formatRm(lineTotal)}`; }); const postage = getPostage(); const total = subtotal + postage; const noteText = custNote.value.trim() ? `\nNota: ${custNote.value.trim()}` : ''; return ['Assalamualaikum, saya nak checkout:','',`Nama: ${custName.value.trim()}`,`No. Telefon: ${custPhone.value.trim()}`,`Kawasan: ${custArea.value}`,`Negeri / Bandar: ${custState.value.trim()}`,`Alamat: ${custAddress.value.trim()}`,'','Item:',...lines,'',`Subtotal: ${formatRm(subtotal)}`,`Postage: ${formatRm(postage)}`,`Jumlah Keseluruhan: ${formatRm(total)}`,noteText].join('\n'); }
function renderFaq(){ faqList.innerHTML = faqs.map((item, index) => `<div class="faq-item ${index===0?'open':''}"><button class="faq-btn-acc"><span>${item.q}</span><span>⌄</span></button><div class="faq-a">${item.a}</div></div>`).join(''); faqList.querySelectorAll('.faq-btn-acc').forEach(btn => btn.addEventListener('click', () => btn.parentElement.classList.toggle('open'))); }
searchInput.addEventListener('input', e => { searchValue = e.target.value.trim(); renderProducts(); }); custArea.addEventListener('change', renderCart); checkoutBtn.addEventListener('click', () => { const msg = buildWhatsappMessage(); if (msg) window.open(waUrl(msg), '_blank', 'noopener'); }); detailsClose.addEventListener('click', closeDetails); detailsCloseX.addEventListener('click', closeDetails); detailsOverlay.addEventListener('click', e => { if (e.target === detailsOverlay) closeDetails(); }); faqOpenBtn.addEventListener('click', openFaq); faqClose.addEventListener('click', closeFaq); faqCloseX.addEventListener('click', closeFaq); faqProceed.addEventListener('click', closeFaq); faqOverlay.addEventListener('click', e => { if (e.target === faqOverlay) closeFaq(); }); mobileCartBtn.addEventListener('click', openCartDrawer); cartDrawerBackdrop.addEventListener('click', closeCartDrawer); cartCloseBtn.addEventListener('click', closeCartDrawer); window.addEventListener('resize', () => { if(!isMobile()) closeCartDrawer(); }); document.addEventListener('keydown', e => { if (e.key === 'Escape'){ if (!detailsOverlay.classList.contains('hidden')) closeDetails(); if (!faqOverlay.classList.contains('hidden')) closeFaq(); if (cartPanel.classList.contains('open')) closeCartDrawer(); } });
