<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Oren Hitam Clean</title>
  <meta name="description" content="Template marketplace ringan tema oren hitam versi clean." />
  <style>
    :root {
      --orange: #ee4d2d;
      --orange-dark: #d4381c;
      --orange-soft: #fff1eb;
      --black: #121212;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #ececec;
      --bg: #f6f6f6;
      --card: #ffffff;
      --radius: 18px;
      --shadow: 0 10px 28px rgba(0, 0, 0, .08);
      --container: 1200px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button, input { font: inherit; }
    .container { width: min(calc(100% - 28px), var(--container)); margin-inline: auto; }

    .main-header {
      background: linear-gradient(180deg, var(--orange), #ff6a33);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 30;
      box-shadow: 0 8px 20px rgba(238, 77, 45, .18);
    }
    .main-header-inner {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items: center;
      padding: 14px 0 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .brand-badge {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.25);
      font-size: 1.2rem;
      font-weight: 900;
    }
    .brand-name { font-size: 1.15rem; font-weight: 800; line-height: 1.2; }
    .brand-tag { font-size: .86rem; opacity: .92; }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border-radius: 8px;
      padding: 10px 12px 10px 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .search-bar input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      color: var(--text);
    }
    .search-btn {
      border: none;
      background: var(--orange);
      color: #fff;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
    }

    .section { padding: 14px 0 24px; }
    .section-card {
      background: #fff;
      border-radius: 20px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .flash-wrap {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .flash-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      color: var(--orange-dark);
      font-size: 1.1rem;
    }
    .countdown {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .box-time {
      min-width: 38px;
      padding: 9px 8px;
      text-align: center;
      color: #fff;
      background: var(--black);
      border-radius: 10px;
      font-weight: 900;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }
    .product-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .product-card:hover {
      transform: translateY(-3px);
      border-color: #ffcab8;
      box-shadow: 0 12px 20px rgba(0,0,0,.06);
    }
    .thumb {
      aspect-ratio: 1 / 1;
      background: #fff5f0;
      overflow: hidden;
      position: relative;
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .discount-badge {
      position: absolute;
      top: 0;
      right: 0;
      background: #ffd666;
      color: #8a4b00;
      font-weight: 900;
      font-size: .78rem;
      padding: 6px 7px;
      border-bottom-left-radius: 10px;
    }
    .product-content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .product-name {
      margin: 0;
      font-size: .95rem;
      line-height: 1.45;
      min-height: 2.75em;
    }
    .product-desc {
      margin: 0;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.55;
      min-height: 2.7em;
    }
    .price {
      font-size: 1.12rem;
      font-weight: 900;
      color: var(--orange-dark);
      margin-top: auto;
    }
    .old-price {
      color: #9ca3af;
      text-decoration: line-through;
      font-size: .82rem;
      font-weight: 700;
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: .8rem;
      color: var(--muted);
    }
    .sold-chip {
      padding: 4px 8px;
      border-radius: 999px;
      background: #f9fafb;
      border: 1px solid var(--line);
      font-weight: 800;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .btn {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 800;
      transition: transform .16s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--line); }

    .empty {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px dashed #ffcfbf;
      border-radius: 18px;
      text-align: center;
      padding: 36px 16px;
      color: var(--muted);
    }

    .cart-fab {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--orange);
      color: #fff;
      font-size: 1.3rem;
      box-shadow: 0 16px 26px rgba(238,77,45,.28);
      cursor: pointer;
      z-index: 40;
    }
    .cart-count {
      position: absolute;
      top: -4px;
      right: -2px;
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--black);
      color: #fff;
      font-size: .78rem;
      font-weight: 800;
      border: 2px solid #fff;
    }

    .cart-drawer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.42);
      display: none;
      justify-content: end;
      z-index: 50;
    }
    .cart-drawer.open { display: flex; }
    .cart-panel {
      width: min(100%, 420px);
      height: 100%;
      background: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .cart-items {
      flex: 1;
      display: grid;
      gap: 12px;
      overflow: auto;
      padding-right: 4px;
    }
    .cart-item {
      display: grid;
      grid-template-columns: 70px 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fff;
    }
    .cart-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
    }
    .qty {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      background: #fff;
      margin-top: 8px;
    }
    .qty button {
      border: none;
      background: transparent;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 900;
    }
    .qty button:hover { background: #f3f4f6; }
    .summary {
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 14px;
      display: grid;
      gap: 12px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-weight: 700;
    }
    .summary-row.total { color: var(--text); font-size: 1.05rem; font-weight: 900; }

    .footer {
      padding: 10px 0 46px;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .product-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 860px) {
      .main-header-inner { grid-template-columns: 1fr; }
      .product-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .product-grid { grid-template-columns: repeat(2, 1fr); }
      .actions { grid-template-columns: 1fr; }
      .search-bar { padding: 8px 8px 8px 12px; }
      .search-btn { padding: 10px 12px; }
    }
    @media (max-width: 430px) {
      .product-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .section-card, .cart-panel { padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="container main-header-inner">
      <div class="brand">
        <div class="brand-badge" id="brandBadge">MK</div>
        <div>
          <div class="brand-name" id="brandName">Market Oren</div>
          <div class="brand-tag" id="brandTag">Template marketplace ringan</div>
        </div>
      </div>

      <label class="search-bar">
        <input id="searchInput" type="search" placeholder="Cari produk, kategori atau kata kunci..." />
        <button class="search-btn" onclick="renderProducts()">Cari</button>
      </label>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container section-card">
        <div class="flash-wrap">
          <div class="flash-title">Produk</div>
          <div class="countdown">
            <div class="box-time">ON</div>
          </div>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container" id="footerText">© 2026 Market Oren. Semua hak cipta terpelihara.</div>
  </footer>

  <button class="cart-fab" onclick="toggleCart(true)" aria-label="Buka cart">
    🛒
    <span class="cart-count" id="cartCount">0</span>
  </button>

  <div class="cart-drawer" id="cartDrawer" onclick="drawerBackdrop(event)">
    <aside class="cart-panel">
      <div class="cart-header">
        <div>
          <div style="font-size:1.3rem; font-weight:900;">Cart Anda</div>
          <div style="color:var(--muted); margin-top:4px;">Terus checkout melalui WhatsApp.</div>
        </div>
        <button class="btn btn-outline" onclick="toggleCart(false)">Tutup</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="summary">
        <div class="summary-row"><span>Subtotal</span><strong id="subtotal">RM0.00</strong></div>
        <div class="summary-row"><span>Shipping</span><strong id="shipping">RM0.00</strong></div>
        <div class="summary-row total"><span>Jumlah</span><strong id="total">RM0.00</strong></div>
        <button class="btn btn-primary" onclick="checkoutWhatsApp()">Checkout WhatsApp</button>
        <button class="btn btn-outline" onclick="clearCart()">Kosongkan Cart</button>
      </div>
    </aside>
  </div>

  <script src="products.js"></script>
  <script>
    const config = window.SHOP_CONFIG || {
      shopName: 'Market Oren',
      shopTagline: 'Template marketplace ringan',
      whatsappNumber: '60123456789',
      shippingFlat: 8,
      footerText: '© 2026 Market Oren. Semua hak cipta terpelihara.'
    };

    const products = Array.isArray(window.PRODUCTS) ? window.PRODUCTS : [];
    const productGrid = document.getElementById('productGrid');
    const searchInput = document.getElementById('searchInput');
    const cartCountEl = document.getElementById('cartCount');
    const cartDrawer = document.getElementById('cartDrawer');
    const cartItemsEl = document.getElementById('cartItems');
    const subtotalEl = document.getElementById('subtotal');
    const shippingEl = document.getElementById('shipping');
    const totalEl = document.getElementById('total');

    let cart = JSON.parse(localStorage.getItem('shopCartMarketplaceLite') || '[]');

    function currency(value) {
      return new Intl.NumberFormat('ms-MY', { style: 'currency', currency: 'MYR' }).format(value || 0);
    }

    function initBrand() {
      document.title = config.shopName;
      document.getElementById('brandName').textContent = config.shopName;
      document.getElementById('brandTag').textContent = config.shopTagline;
      document.getElementById('brandBadge').textContent = (config.shopName || 'MK').slice(0, 2).toUpperCase();
      document.getElementById('footerText').textContent = config.footerText;
    }

    function filteredProducts() {
      const q = searchInput.value.trim().toLowerCase();
      return products.filter(p => !q || [p.name, p.description, p.category, p.label].join(' ').toLowerCase().includes(q));
    }

    function renderProducts() {
      const items = filteredProducts();
      if (!items.length) {
        productGrid.innerHTML = `
          <div class="empty">
            <div style="font-size:2rem;">📭</div>
            <h3>Tiada produk dijumpai</h3>
            <p style="margin:0;">Cuba cari kata lain.</p>
          </div>`;
        return;
      }

      productGrid.innerHTML = items.map(p => `
        <article class="product-card">
          <div class="thumb">
            <img src="${p.image}" alt="${p.name}" loading="lazy">
            ${p.discount ? `<div class="discount-badge">-${p.discount}%</div>` : ''}
          </div>
          <div class="product-content">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.description || ''}</p>
            <div class="price">${currency(p.price)}</div>
            <div class="old-price">${p.oldPrice ? currency(p.oldPrice) : ''}</div>
            <div class="meta-row">
              <span>${p.label || 'Pilihan'}</span>
              <span class="sold-chip">${p.sold || '0'} sold</span>
            </div>
            <div class="actions">
              <button class="btn btn-primary" onclick="addToCart(${p.id})">Tambah</button>
              <button class="btn btn-outline" onclick="buyNow(${p.id})">Beli</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    function saveCart() {
      localStorage.setItem('shopCartMarketplaceLite', JSON.stringify(cart));
    }

    function addToCart(id) {
      const item = cart.find(x => x.id === id);
      if (item) item.qty += 1;
      else cart.push({ id, qty: 1 });
      saveCart();
      renderCart();
      toggleCart(true);
    }

   
    function buyNow(id) {
      addToCart(id);
    }


    function getCartDetailed() {
      return cart.map(item => {
        const product = products.find(p => p.id === item.id);
        return product ? { ...product, qty: item.qty, lineTotal: (product.price || 0) * item.qty } : null;
      }).filter(Boolean);
    }

    function renderCart() {
      const items = getCartDetailed();
      const count = items.reduce((sum, item) => sum + item.qty, 0);
      const subtotal = items.reduce((sum, item) => sum + item.lineTotal, 0);
      const shipping = subtotal > 0 ? Number(config.shippingFlat || 0) : 0;
      const total = subtotal + shipping;
      cartCountEl.textContent = count;
      subtotalEl.textContent = currency(subtotal);
      shippingEl.textContent = currency(shipping);
      totalEl.textContent = currency(total);

      if (!items.length) {
        cartItemsEl.innerHTML = `
          <div class="empty" style="grid-column:auto;">
            <div style="font-size:2rem;">🧺</div>
            <h3>Cart kosong</h3>
            <p style="margin:0;">Tambah produk dulu ya.</p>
          </div>`;
        return;
      }

      cartItemsEl.innerHTML = items.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}">
          <div>
            <div style="font-weight:800; line-height:1.45;">${item.name}</div>
            <div style="margin-top:4px; color:var(--muted);">${currency(item.price)} / unit</div>
            <div class="qty">
              <button onclick="updateQty(${item.id}, -1)">−</button>
              <strong>${item.qty}</strong>
              <button onclick="updateQty(${item.id}, 1)">+</button>
            </div>
          </div>
          <div style="font-weight:900;">${currency(item.lineTotal)}</div>
        </div>
      `).join('');
    }

    function updateQty(id, delta) {
      const item = cart.find(x => x.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
      saveCart();
      renderCart();
    }

    function clearCart() {
      cart = [];
      saveCart();
      renderCart();
    }

    function checkoutWhatsApp() {
      const items = getCartDetailed();
      if (!items.length) {
        alert('Cart kosong. Tambah produk dulu.');
        return;
      }
      const subtotal = items.reduce((sum, item) => sum + item.lineTotal, 0);
      const shipping = Number(config.shippingFlat || 0);
      const total = subtotal + shipping;
      const lines = [
        `Hi, saya nak order dari ${config.shopName}:`,
        '',
        ...items.map((item, i) => `${i + 1}. ${item.name} x${item.qty} = ${currency(item.lineTotal)}`),
        '',
        `Subtotal: ${currency(subtotal)}`,
        `Shipping: ${currency(shipping)}`,
        `Jumlah: ${currency(total)}`,
        '',
        'Boleh teruskan dengan details pembayaran dan penghantaran. Terima kasih.'
      ];
      window.open(`https://wa.me/${config.whatsappNumber}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
    }

    function toggleCart(force = null) {
      const open = typeof force === 'boolean' ? force : !cartDrawer.classList.contains('open');
      cartDrawer.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }

    function drawerBackdrop(e) {
      if (e.target === cartDrawer) toggleCart(false);
    }

    searchInput.addEventListener('input', renderProducts);

    initBrand();
    renderProducts();
    renderCart();
  </script>
</body>
</html>
